<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>

body{
    margin:0;
    background:#f8fafc;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{

    background:white;
    width:420px;
    max-width:90%;
    padding:40px;
    border-radius:14px;
    text-align:center;

    box-shadow:
    0 6px 24px rgba(0,0,0,.08);

}

.check{
    font-size:56px;
}

h1{
    margin-top:20px;
    margin-bottom:10px;
    color:#111827;
}

p{
    color:#6B7280;
    line-height:1.6;
}

</style>

</head>

<body>

<div class="card">

<div class="check">✅</div>

<h1>Thank you!</h1>

<p>Your feedback has been recorded.</p>

</div>

</body>

</html>
